<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><meta name="theme-color" content="#020817"><title>3D Earth</title><style>*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#020817;color:#eef8ff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;overscroll-behavior:none}canvas{position:fixed;inset:0;width:100%;height:100%;touch-action:none}.p{position:fixed;z-index:3;top:max(12px,env(safe-area-inset-top));left:max(12px,env(safe-area-inset-left));width:min(305px,calc(100vw - 24px));padding:14px;border:1px solid rgba(130,205,255,.22);border-radius:17px;background:rgba(5,17,36,.76);-webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);box-shadow:0 16px 40px #0007}.tag{font-size:9px;letter-spacing:.13em;color:#6bd2ff;font-weight:700}h1{margin:4px 0;font-size:24px}.sub{margin:0 0 11px;color:#aec2d1;font-size:11px;line-height:1.5}.c{display:grid;grid-template-columns:1fr 1fr;gap:7px}.c button,.c select{min-height:39px;color:#eef8ff;border:1px solid #9de0ff28;border-radius:10px;background:#ffffff0d;font:inherit;font-size:11px;padding:0 9px}.c button[aria-pressed=true]{background:#58c8ff27;border-color:#63d2ff99}.wide{grid-column:1/-1}.s{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:8px}.v{padding:7px 9px;border-radius:9px;background:#0003;border:1px solid #ffffff0d;font-size:11px}.v b{display:block;color:#94aebe;font-size:8px;letter-spacing:.12em;margin-bottom:2px}.hint{position:fixed;z-index:2;left:50%;bottom:max(12px,env(safe-area-inset-bottom));transform:translateX(-50%);padding:7px 11px;border-radius:99px;background:#061326b8;border:1px solid #8bd6ff25;color:#a9bdcc;font-size:10px;white-space:nowrap}</style></head><body><canvas id="g"></canvas><div class="p"><div class="tag">OFFLINE READY · NO EXTERNAL FILES</div><h1>3D Earth</h1><p class="sub">ドラッグで回転、ピンチで拡大縮小。地球をタップすると緯度・経度を表示します。</p><div class="c"><button id="a" aria-pressed="true">↻ 自動回転</button><button id="q" aria-pressed="true">⌗ 緯度経度線</button><button id="l" aria-pressed="true">● 都市名</button><button id="r">◎ 初期位置</button><select id="city" class="wide"><option value="">都市へ移動…</option></select></div><div class="s"><div class="v"><b>LATITUDE</b><span id="lat">—</span></div><div class="v"><b>LONGITUDE</b><span id="lon">—</span></div></div></div><div class="hint">ドラッグ：回転　ピンチ：ズーム　タップ：座標</div><script>(()=>{'use strict';const C=document.getElementById('g'),x=C.getContext('2d');if(!x){document.body.innerHTML='Canvasを表示できません。Safariで再読み込みしてください。';return}let W,H,d=1,cx,cy,bR,R,z=1,cl=139.65,ct=23,auto=1,grid=1,labels=1,last=performance.now();const D=Math.PI/180,U=180/Math.PI,stars=Array.from({length:260},()=>[Math.random(),Math.random(),.2+Math.random()*.7,.4+Math.random()*1.2]);const land=[[[-168,71],[-145,62],[-128,52],[-124,38],[-117,31],[-98,18],[-83,10],[-76,18],[-82,26],[-98,33],[-116,49],[-140,60],[-160,60]],[[-82,12],[-70,10],[-52,3],[-40,-15],[-54,-38],[-67,-55],[-74,-35],[-77,-15]],[[-12,36],[-6,45],[3,52],[22,60],[40,69],[59,67],[50,54],[31,46],[18,38],[2,44]],[[-17,35],[2,37],[23,31],[42,12],[51,10],[39,-13],[21,-35],[7,-30],[-4,-15],[-13,10]],[[27,40],[50,54],[77,60],[105,63],[133,53],[160,60],[176,65],[158,45],[137,36],[113,24],[98,7],[86,22],[70,20],[52,29],[37,36]],[[112,-11],[136,-12],[153,-23],[146,-39],[117,-35]],[[129,31],[135,35],[140,39],[145,44],[144,39],[138,34]],[[-55,83],[-22,77],[-43,60],[-67,69]],[[-180,-65],[-120,-70],[-60,-69],[0,-71],[60,-69],[120,-70],[180,-65],[180,-90],[-180,-90]]];const cities=[['東京',35.676,139.65],['豊橋',34.769,137.392],['ロンドン',51.507,-.128],['ニューヨーク',40.713,-74.006],['パリ',48.857,2.352],['シンガポール',1.352,103.82],['シドニー',-33.869,151.209]];const sel=document.getElementById('city');cities.forEach((c,i)=>{const o=document.createElement('option');o.value=i;o.textContent=c[0];sel.appendChild(o)});function size(){d=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;C.width=W*d;C.height=H*d;C.style.width=W+'px';C.style.height=H+'px';x.setTransform(d,0,0,d,0,0);cx=W/2;cy=H/2+(W<650?38:8);bR=Math.min(W,H)*(W<650?.34:.38);R=bR*z}addEventListener('resize',size,{passive:true});size();const nl=v=>((v+540)%360)-180;function p(lat,lon){let a=lat*D,b=(lon-cl)*D,c=ct*D,k=Math.cos(a);return{X:k*Math.sin(b),Y:Math.cos(c)*Math.sin(a)-Math.sin(c)*k*Math.cos(b),Z:Math.sin(c)*Math.sin(a)+Math.cos(c)*k*Math.cos(b)}}function inv(px,py){let X=(px-cx)/R,Y=-(py-cy)/R,k=X*X+Y*Y;if(k>1)return null;let Z=Math.sqrt(1-k),c=ct*D,s=Y*Math.cos(c)+Z*Math.sin(c),la=Math.asin(Math.max(-1,Math.min(1,s))),lo=cl*D+Math.atan2(X,Z*Math.cos(c)-Y*Math.sin(c));return[la*U,nl(lo*U)]}function path(poly){x.beginPath();let on=0;for(let i=0;i<=poly.length;i++){let a=poly[i%poly.length],b=poly[(i+1)%poly.length],dl=nl(b[0]-a[0]),n=Math.max(1,Math.ceil(Math.max(Math.abs(dl),Math.abs(b[1]-a[1]))/3));for(let j=0;j<n;j++){let t=j/n,v=p(a[1]+(b[1]-a[1])*t,nl(a[0]+dl*t));if(v.Z>=0){let X=cx+v.X*R,Y=cy-v.Y*R;if(!on){x.moveTo(X,Y);on=1}else x.lineTo(X,Y)}else on=0}}x.closePath()}function draw(){x.clearRect(0,0,W,H);x.fillStyle='#020817';x.fillRect(0,0,W,H);x.fillStyle='#fff';for(const s of stars){x.globalAlpha=s[2];x.beginPath();x.arc(s[0]*W,s[1]*H,s[3],0,7);x.fill()}x.globalAlpha=1;x.save();x.beginPath();x.arc(cx,cy,R,0,7);x.clip();let g=x.createRadialGradient(cx-R*.35,cy-R*.4,R*.02,cx,cy,R*1.2);g.addColorStop(0,'#269bdd');g.addColorStop(.5,'#07588e');g.addColorStop(1,'#012640');x.fillStyle=g;x.fillRect(cx-R,cy-R,R*2,R*2);if(grid){x.strokeStyle='#9de5ff28';x.lineWidth=.7;for(let la=-60;la<=60;la+=30){x.beginPath();let o=0;for(let lo=-180;lo<=180;lo+=2){let v=p(la,lo);if(v.Z>=0){let X=cx+v.X*R,Y=cy-v.Y*R;if(!o){x.moveTo(X,Y);o=1}else x.lineTo(X,Y)}else o=0}x.stroke()}for(let lo=-180;lo<180;lo+=30){x.beginPath();let o=0;for(let la=-89;la<=89;la+=2){let v=p(la,lo);if(v.Z>=0){let X=cx+v.X*R,Y=cy-v.Y*R;if(!o){x.moveTo(X,Y);o=1}else x.lineTo(X,Y)}else o=0}x.stroke()}}let lg=x.createLinearGradient(cx-R,cy-R,cx+R,cy+R);lg.addColorStop(0,'#8bb269');lg.addColorStop(.55,'#4e8a55');lg.addColorStop(1,'#286844');x.fillStyle=lg;x.strokeStyle='#d8f3b84c';x.lineWidth=.65;for(const a of land){path(a);x.fill();x.stroke()}let n=x.createLinearGradient(cx-R,cy,cx+R,cy);n.addColorStop(0,'#00081799');n.addColorStop(.5,'#0000');n.addColorStop(1,'#ffffff12');x.fillStyle=n;x.fillRect(cx-R,cy-R,R*2,R*2);x.restore();x.strokeStyle='#62d2ffbb';x.lineWidth=1.3;x.beginPath();x.arc(cx,cy,R,0,7);x.stroke();if(labels){x.font='11px -apple-system,sans-serif';x.textBaseline='middle';for(const c of cities){let v=p(c[1],c[2]);if(v.Z<.08)continue;let X=cx+v.X*R,Y=cy-v.Y*R;x.fillStyle='#74d9ff';x.beginPath();x.arc(X,Y,3,0,7);x.fill();x.fillStyle='#eefaff';x.fillText(c[0],X+8,Y)}}}function loop(t){let dt=Math.min((t-last)/1000,.05);last=t;if(auto)cl=nl(cl+dt*4.2);draw();requestAnimationFrame(loop)}requestAnimationFrame(loop);const pts=new Map();let drag,pinch,moved=0;C.onpointerdown=e=>{C.setPointerCapture(e.pointerId);pts.set(e.pointerId,[e.clientX,e.clientY]);moved=0;if(pts.size===1)drag=[e.clientX,e.clientY,cl,ct];if(pts.size===2){let a=[...pts.values()];pinch=[Math.hypot(a[0][0]-a[1][0],a[0][1]-a[1][1]),z];auto=0;sync()}};C.onpointermove=e=>{if(!pts.has(e.pointerId))return;let o=pts.get(e.pointerId);pts.set(e.pointerId,[e.clientX,e.clientY]);moved+=Math.hypot(e.clientX-o[0],e.clientY-o[1]);if(pts.size===1&&drag){cl=nl(drag[2]-(e.clientX-drag[0])*.32/z);ct=Math.max(-80,Math.min(80,drag[3]+(e.clientY-drag[1])*.25/z));auto=0;sync()}else if(pts.size===2&&pinch){let a=[...pts.values()],m=Math.hypot(a[0][0]-a[1][0],a[0][1]-a[1][1]);z=Math.max(.62,Math.min(1.72,pinch[1]*m/pinch[0]));R=bR*z}};function up(e){pts.delete(e.pointerId);if(!pts.size){if(moved<8){let v=inv(e.clientX,e.clientY);if(v){document.getElementById('lat').textContent=Math.abs(v[0]).toFixed(3)+'° '+(v[0]>=0?'N':'S');document.getElementById('lon').textContent=Math.abs(v[1]).toFixed(3)+'° '+(v[1]>=0?'E':'W')}}drag=pinch=null}else if(pts.size===1){let a=[...pts.values()][0];drag=[a[0],a[1],cl,ct];pinch=null}}C.onpointerup=up;C.onpointercancel=up;C.addEventListener('wheel',e=>{e.preventDefault();z=Math.max(.62,Math.min(1.72,z*Math.exp(-e.deltaY*.001)));R=bR*z},{passive:false});function sync(){a.setAttribute('aria-pressed',!!auto);q.setAttribute('aria-pressed',!!grid);l.setAttribute('aria-pressed',!!labels)}const a=document.getElementById('a'),q=document.getElementById('q'),l=document.getElementById('l');a.onclick=()=>{auto=!auto;sync()};q.onclick=()=>{grid=!grid;sync()};l.onclick=()=>{labels=!labels;sync()};document.getElementById('r').onclick=()=>{cl=139.65;ct=23;z=1;R=bR;auto=1;sel.value='';sync()};sel.onchange=()=>{if(sel.value==='')return;let c=cities[+sel.value];cl=c[2];ct=Math.max(-70,Math.min(70,c[1]));auto=0;sync()}})();</script></body></html>
