name: Publish WorldGuess Street View

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/publish-worldguess-streetview.yml

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assemble Street View game
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p worldguess
          cat .github/worldguess-streetview-src/part*.txt | base64 -d | gzip -d > worldguess/index.html
          grep -q "WORLDGUESS Street View" worldguess/index.html
          grep -q "StreetViewPanorama" worldguess/index.html
          test "$(wc -c < worldguess/index.html)" -gt 20000
      - name: Commit published page
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add worldguess/index.html
          git diff --cached --quiet && exit 0
          git commit -m "Publish WorldGuess Street View edition"
          git push
