name: Build self-hosted Earth
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/build-earth.yml
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assemble local-only globe
        shell: bash
        run: |
          set -euo pipefail
          TMP="$(mktemp -d)"
          cd "$TMP"
          npm pack globe.gl@2.46.1 --silent
          npm pack three-globe@2.45.1 --silent
          mkdir globe threeglobe
          tar -xzf globe.gl-2.46.1.tgz -C globe
          tar -xzf three-globe-2.45.1.tgz -C threeglobe
          cd "$GITHUB_WORKSPACE"
          mkdir -p earth/vendor earth/assets
          cp "$TMP/globe/package/dist/globe.gl.min.js" earth/vendor/globe.gl.min.js
          cp "$TMP/threeglobe/package/example/img/earth-day.jpg" earth/assets/earth-day.jpg
          cp "$TMP/threeglobe/package/example/img/earth-topology.png" earth/assets/earth-topology.png
          cat > earth/index.html <<'HTML'
          <!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><meta name="theme-color" content="#020713"><title>3D Earth</title><style>
          :root{color-scheme:dark;--p:rgba(7,18,35,.78);--l:rgba(122,205,255,.24);--t:#eff8ff;--m:#a6bdcf}*{box-sizing:border-box}html,body,#app{width:100%;height:100%;margin:0;overflow:hidden;background:#020713;color:var(--t);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP",sans-serif}#app{touch-action:none}.top{position:fixed;z-index:10;top:max(12px,env(safe-area-inset-top));left:max(12px,env(safe-area-inset-left));right:max(12px,env(safe-area-inset-right));display:flex;justify-content:space-between;pointer-events:none}.brand,.tools,.panel,.coords{border:1px solid var(--l);background:var(--p);-webkit-backdrop-filter:blur(16px) saturate(130%);backdrop-filter:blur(16px) saturate(130%);box-shadow:0 16px 44px #0006}.brand,.tools{pointer-events:auto}.brand{padding:10px 13px;border-radius:15px}.brand b{display:block;font-size:16px}.brand span{display:block;margin-top:2px;color:var(--m);font-size:10px}.tools{display:flex;gap:6px;padding:6px;border-radius:15px}button,select{font:inherit;color:var(--t)}button{height:42px;min-width:42px;padding:0 11px;border:1px solid #7ed2ff2b;border-radius:10px;background:#ffffff0e}button[aria-pressed=true]{border-color:#63d2ffa8;background:#2fa3e233}button:active{transform:translateY(1px)}button .txt{margin-left:4px;font-size:11px}.panel{position:fixed;z-index:9;top:max(76px,calc(env(safe-area-inset-top) + 64px));right:max(12px,env(safe-area-inset-right));width:min(300px,calc(100vw - 24px));padding:13px;border-radius:16px;opacity:0;transform:scale(.97) translateY(-5px);transform-origin:top right;pointer-events:none;transition:.18s}.panel.open{opacity:1;transform:none;pointer-events:auto}.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}.row+.row{margin-top:8px}.panel button{width:100%;font-size:11px}.panel select{width:100%;height:42px;padding:0 12px;border:1px solid #7ed2ff2b;border-radius:10px;background:#102139}.wide{grid-column:1/-1}.coords{position:fixed;z-index:8;left:50%;bottom:max(14px,env(safe-area-inset-bottom));transform:translateX(-50%);display:flex;gap:10px;align-items:center;padding:8px 12px;border-radius:999px;color:var(--m);font-size:10px;white-space:nowrap}.coords strong{color:var(--t);font-variant-numeric:tabular-nums}.sep{width:1px;height:14px;background:#96d7ff33}.loading,.error{position:fixed;inset:0;z-index:30;display:grid;place-items:center;background:radial-gradient(circle at 50% 45%,#0a294a,#020713 62%)}.loading.done{opacity:0;visibility:hidden;pointer-events:none;transition:.35s}.spin{width:42px;height:42px;margin:auto;border:3px solid #82d5ff29;border-top-color:#63d2ff;border-radius:50%;animation:r .8s linear infinite}.loading p{margin:12px 0 0;color:#b6cbda;font-size:12px}@keyframes r{to{transform:rotate(360deg)}}.error{display:none;padding:20px}.error.show{display:grid}.box{max-width:430px;padding:22px;border:1px solid #ff9c7859;border-radius:18px;background:#101b2c;text-align:center}.box h2{margin:0 0 8px;font-size:20px}.box p{margin:0 0 15px;color:#c1ced8;font-size:13px;line-height:1.65}@media(max-width:640px){.brand span{display:none}.brand{padding:10px 12px}.tools .txt{display:none}.tools button{padding:0;min-width:40px}.panel{top:max(72px,calc(env(safe-area-inset-top) + 60px))}}
          </style></head><body><div id="app"></div><div class="top"><div class="brand"><b>3D Earth</b><span>ドラッグで回転 · ピンチでズーム</span></div><div class="tools"><button id="auto" aria-pressed="true">↻<span class="txt">自動回転</span></button><button id="menu" aria-pressed="false">☰<span class="txt">設定</span></button></div></div><div id="panel" class="panel"><div class="row"><button id="grid" aria-pressed="false">⌗ 緯度経度線</button><button id="names" aria-pressed="true">● 都市名</button></div><div class="row"><button id="reset">◎ 初期位置</button><button id="atmo" aria-pressed="true">◯ 大気</button></div><div class="row"><select id="city" class="wide"><option value="">都市へ移動…</option></select></div></div><div class="coords"><span>緯度 <strong id="lat">—</strong></span><span class="sep"></span><span>経度 <strong id="lon">—</strong></span></div><div id="loading" class="loading"><div><div class="spin"></div><p>地球データを読み込み中…</p></div></div><div id="error" class="error"><div class="box"><h2>表示できませんでした</h2><p id="errorText">Safariで再読み込みしてください。</p><button onclick="location.reload()">再読み込み</button></div></div><script src="./vendor/globe.gl.min.js"></script><script>
          (()=>{'use strict';const $=x=>document.getElementById(x),load=$('loading'),err=$('error'),errText=$('errorText');let ready=false;function fail(m,e){console.error(m,e||'');load.classList.add('done');errText.textContent=m;err.classList.add('show')}window.addEventListener('error',e=>{if(!ready)fail('3D地球儀の初期化中にエラーが発生しました。',e.error||e.message)});if(typeof Globe!=='function'){fail('3D描画ライブラリを読み込めませんでした。');return}const C=[['東京',35.6762,139.6503],['豊橋',34.7692,137.3915],['ロンドン',51.5072,-.1276],['ニューヨーク',40.7128,-74.006],['パリ',48.8566,2.3522],['シンガポール',1.3521,103.8198],['ドバイ',25.2048,55.2708],['シドニー',-33.8688,151.2093],['サンパウロ',-23.5505,-46.6333]].map(x=>({name:x[0],lat:x[1],lng:x[2]})),sel=$('city');C.forEach((c,i)=>{const o=document.createElement('option');o.value=i;o.textContent=c.name;sel.appendChild(o)});let globe,ctl,rot=true,names=true,atmo=true;try{globe=Globe({animateIn:false})($('app')).globeImageUrl('./assets/earth-day.jpg').bumpImageUrl('./assets/earth-topology.png').backgroundColor('#020713').showAtmosphere(true).atmosphereColor('#64cfff').atmosphereAltitude(.18).showGraticules(false).pointsData(C).pointLat('lat').pointLng('lng').pointColor(()=> '#6bdcff').pointAltitude(.018).pointRadius(.15).labelsData(C).labelLat('lat').labelLng('lng').labelText('name').labelColor(()=> 'rgba(235,250,255,.95)').labelSize(.9).labelDotRadius(.22).labelResolution(2).onGlobeClick(({lat,lng})=>{$('lat').textContent=Math.abs(lat).toFixed(3)+'° '+(lat>=0?'N':'S');$('lon').textContent=Math.abs(lng).toFixed(3)+'° '+(lng>=0?'E':'W')}).onGlobeReady(()=>{ready=true;load.classList.add('done')});globe.pointOfView({lat:25,lng:138,altitude:2.05},0);ctl=globe.controls();ctl.autoRotate=true;ctl.autoRotateSpeed=.48;ctl.enableDamping=true;ctl.dampingFactor=.08}catch(e){fail('WebGLを開始できませんでした。Safariで開き直してください。',e);return}const press=(id,v)=>$(id).setAttribute('aria-pressed',String(v));$('auto').onclick=()=>{rot=!rot;ctl.autoRotate=rot;press('auto',rot)};$('menu').onclick=()=>{const o=!$('panel').classList.contains('open');$('panel').classList.toggle('open',o);press('menu',o)};$('grid').onclick=()=>{const v=!globe.showGraticules();globe.showGraticules(v);press('grid',v)};$('names').onclick=()=>{names=!names;globe.labelsData(names?C:[]).pointsData(names?C:[]);press('names',names)};$('atmo').onclick=()=>{atmo=!atmo;globe.showAtmosphere(atmo);press('atmo',atmo)};$('reset').onclick=()=>{globe.pointOfView({lat:25,lng:138,altitude:2.05},800);rot=true;ctl.autoRotate=true;sel.value='';press('auto',true)};sel.onchange=()=>{if(sel.value==='')return;const c=C[+sel.value];rot=false;ctl.autoRotate=false;press('auto',false);globe.pointOfView({lat:c.lat,lng:c.lng,altitude:1.45},900)};function size(){globe.width(innerWidth).height(innerHeight)}addEventListener('resize',size,{passive:true});size();setTimeout(()=>{if(!ready)fail('読み込みが完了しませんでした。通信を確認して再読み込みしてください。')},12000)})();
          </script></body></html>
          HTML
      - name: Commit generated site
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add earth/index.html earth/vendor/globe.gl.min.js earth/assets/earth-day.jpg earth/assets/earth-topology.png
          git diff --cached --quiet && exit 0
          git commit -m "Build self-hosted 3D Earth"
          git push
