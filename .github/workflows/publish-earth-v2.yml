name: Publish Earth v2
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/publish-earth-v2.yml
permissions:
  contents: write
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create cache-isolated copy
        run: |
          set -euo pipefail
          rm -rf earth-v2
          cp -R earth earth-v2
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add earth-v2
          git diff --cached --quiet && exit 0
          git commit -m "Publish cache-isolated 3D Earth v2"
          git push
